# MoveIt Servo configuration used only for 'jog' mode (simulation or myCobot).
# Kinesthetic mode on the real UR10e bypasses Servo and relies on UR freedrive.

moveit_servo:
  ros__parameters:
    use_gazebo: true
    move_group_name: ur_manipulator
    planning_frame: base_link
    ee_frame_name: tool0
    robot_link_command_frame: tool0

    incoming_command_timeout: 0.2
    num_outgoing_halt_msgs_to_publish: 4
    publish_period: 0.01

    command_in_type: speed_units
    scale:
      linear: 0.4
      rotational: 0.8
      joint: 0.5

    publish_joint_positions: true
    publish_joint_velocities: false
    publish_joint_accelerations: false

    command_out_type: trajectory_msgs/JointTrajectory
    command_out_topic: /scaled_joint_trajectory_controller/joint_trajectory

    cartesian_command_in_topic: /servo_node/delta_twist_cmds
    joint_command_in_topic: /servo_node/delta_joint_cmds

    joint_topic: /joint_states
    status_topic: /servo_node/status

    # Safety
    check_collisions: true
    self_collision_proximity_threshold: 0.01
    scene_collision_proximity_threshold: 0.02
    lower_singularity_threshold: 17.0
    hard_stop_singularity_threshold: 30.0
